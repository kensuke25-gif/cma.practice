<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>証券アナリスト｜マクロ経済学 問題集</title>

<!-- MathJax for 数式レンダリング -->
<script>
MathJax = {
  tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']], processEscapes: true },
  options: { skipHtmlTags: ['script','noscript','style','textarea'] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
:root {
  --ink:       #12192c;
  --ink-mid:   #2c3a55;
  --ink-soft:  #5a6a82;
  --gold:      #b8924a;
  --gold-lt:   #d4af72;
  --gold-pale: #f5ead6;
  --cream:     #faf7f2;
  --white:     #ffffff;
  --rule:      #ddd5c8;
  --correct-bg:#e8f5ee;
  --correct:   #2e7d52;
  --radius:    14px;
  --shadow:    0 4px 32px rgba(18,25,44,.10);
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family:'Noto Sans JP',sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  padding: 0 36px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 2px 16px rgba(0,0,0,.3);
}
.logo {
  display:flex; flex-direction:column; gap:1px;
}
.logo-sub {
  font-size: 9px; letter-spacing:4px; color:var(--gold); text-transform:uppercase;
}
.logo-main {
  font-family:'DM Serif Display',serif;
  font-size:17px; color:var(--white); letter-spacing:.5px;
}
.header-right { display:flex; gap:12px; align-items:center; }

.btn-pdf {
  background: transparent;
  border: 1.5px solid var(--gold);
  color: var(--gold);
  padding: 7px 20px; border-radius:6px;
  font-size:12px; font-weight:700; cursor:pointer;
  letter-spacing:.5px; transition:.2s;
  font-family:'Noto Sans JP',sans-serif;
}
.btn-pdf:hover { background:var(--gold); color:var(--ink); }

/* ── PROGRESS ── */
.prog-wrap { height:3px; background:var(--ink-mid); }
.prog-bar  { height:3px; background:var(--gold); transition:width .5s ease; }

/* ── LAYOUT ── */
main {
  flex:1; max-width:820px; width:100%;
  margin:0 auto; padding:40px 24px 60px;
}

/* ── META ROW ── */
.meta-row {
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:20px;
}
.q-num {
  font-size:12px; color:var(--ink-soft); font-weight:500; letter-spacing:.5px;
  text-transform:uppercase;
}
.q-num strong {
  font-family:'DM Serif Display',serif;
  font-size:36px; color:var(--ink); line-height:1;
  display:block; margin-top:2px;
}
.category-tag {
  background:var(--ink); color:var(--gold);
  font-size:11px; font-weight:700; letter-spacing:1.5px;
  padding:5px 16px; border-radius:20px;
}

/* ── CARD ── */
.card {
  background:var(--white);
  border-radius:var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--rule);
  overflow:hidden;
}

/* タブバー */
.tab-bar {
  display:flex; border-bottom:1px solid var(--rule);
}
.tab-btn {
  flex:1; padding:14px; border:none; background:transparent;
  font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700;
  color:var(--ink-soft); cursor:pointer; letter-spacing:.5px;
  transition:.2s; position:relative;
}
.tab-btn::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:0; height:3px; background:var(--gold); transition:.3s;
}
.tab-btn.active { color:var(--ink); }
.tab-btn.active::after { width:60%; }

/* カード内部 */
.card-body { padding:36px 40px 40px; min-height:420px; display:flex; flex-direction:column; }

/* ── 問題パネル ── */
#questionPanel { flex:1; display:flex; flex-direction:column; }

.q-source {
  font-size:11px; color:var(--ink-soft); letter-spacing:.5px;
  margin-bottom:16px;
}

.q-text {
  font-family:'Noto Serif JP',serif;
  font-size:15.5px; line-height:2;
  color:var(--ink); flex:1;
  white-space: pre-wrap;
}

/* サブ問題（問1・問2など）*/
.sub-questions { display:flex; flex-direction:column; gap:20px; margin-top:20px; }
.sub-q {
  background:var(--cream);
  border-left:4px solid var(--gold);
  border-radius:0 8px 8px 0;
  padding:16px 20px;
}
.sub-q-label {
  font-size:12px; font-weight:700; color:var(--gold);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;
}
.sub-q-text {
  font-size:14px; line-height:1.9; color:var(--ink);
  font-family:'Noto Serif JP',serif;
  white-space: pre-wrap;
}

/* ── 解説パネル ── */
#explanationPanel { flex:1; display:flex; flex-direction:column; gap:20px; display:none; }

.answer-header {
  display:flex; align-items:center; gap:10px;
  padding-bottom:18px; border-bottom:1px solid var(--rule);
}
.answer-badge {
  background:var(--correct-bg); color:var(--correct);
  font-size:11px; font-weight:700; letter-spacing:1px;
  padding:5px 14px; border-radius:4px;
}
.answer-title {
  font-family:'Noto Serif JP',serif;
  font-size:14px; color:var(--ink-soft);
}

.exp-body { flex:1; display:flex; flex-direction:column; gap:24px; }

.exp-block { display:flex; flex-direction:column; gap:10px; }
.exp-block-label {
  font-size:11px; font-weight:700; color:var(--gold);
  letter-spacing:1.5px; text-transform:uppercase;
}
.exp-text {
  font-size:14px; line-height:2; color:var(--ink-soft);
  border-left:3px solid var(--gold-pale);
  padding-left:16px;
  white-space: pre-wrap;
}
.exp-text strong { color:var(--ink); }
.exp-formula {
  background:var(--gold-pale); border-radius:8px;
  padding:14px 20px; font-size:14px; line-height:2;
  color:var(--ink);
}

/* ── NAV ── */
.navigation {
  display:flex; align-items:center; justify-content:space-between;
  padding:24px 0 0; gap:16px;
}
.nav-btn {
  background:var(--ink); color:var(--white);
  border:none; padding:12px 28px; border-radius:8px;
  font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; letter-spacing:.5px; display:flex; align-items:center; gap:8px;
  transition:.2s;
}
.nav-btn:hover { background:var(--ink-mid); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }

.page-info { text-align:center; flex:1; }
.page-dots { display:flex; gap:8px; justify-content:center; margin-bottom:4px; }
.dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--rule); cursor:pointer; transition:.2s;
}
.dot.active { background:var(--ink); transform:scale(1.2); }
.page-label { font-size:11px; color:var(--ink-soft); letter-spacing:.5px; }

/* ── PRINT ── */
@media print {
  header, .prog-wrap, .navigation, .tab-bar { display:none !important; }
  body { background:white; }
  main { max-width:100%; padding:16px; }
  .card { box-shadow:none; border:1px solid #ccc; break-inside:avoid; margin-bottom:32px; }
  .card-body { min-height:unset; }
  #questionPanel, #explanationPanel { display:flex !important; }
  .meta-row { margin-bottom:12px; }
}

@media (max-width:600px) {
  .card-body { padding:24px 20px; }
  .q-num strong { font-size:28px; }
  .nav-btn { padding:10px 18px; font-size:12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-sub">CMA Examination</span>
    <span class="logo-main">証券アナリスト｜マクロ経済学</span>
  </div>
  <div class="header-right">
    <button class="btn-pdf" onclick="window.print()">🖨 PDF出力</button>
  </div>
</header>

<div class="prog-wrap">
  <div class="prog-bar" id="progBar" style="width:0%"></div>
</div>

<main>
  <div class="meta-row">
    <div class="q-num">
      Question
      <strong id="numDisplay">01</strong>
    </div>
    <div class="category-tag" id="catDisplay">—</div>
  </div>

  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tabQ" onclick="setTab('q')">問　題</button>
      <button class="tab-btn"        id="tabA" onclick="setTab('a')">解　説</button>
    </div>

    <div class="card-body">
      <!-- 問題 -->
      <div id="questionPanel">
        <div class="q-source" id="qSource"></div>
        <div class="q-text"   id="qText"></div>
        <div class="sub-questions" id="subQList"></div>
      </div>

      <!-- 解説 -->
      <div id="explanationPanel">
        <div class="answer-header">
          <span class="answer-badge">ANSWER</span>
          <span class="answer-title">解答・解説</span>
        </div>
        <div class="exp-body" id="expBody"></div>
      </div>
    </div>
  </div>

  <div class="navigation">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)" disabled>← 前の問題</button>
    <div class="page-info">
      <div class="page-dots" id="dotRow"></div>
      <div class="page-label" id="pageLabel">1 / 5</div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="go(1)">次の問題 →</button>
  </div>
</main>

<script>
// =====================================================================
// ★ 問題データ（NotebookLMから抽出した問題をここに追記していく）
// =====================================================================
const questions = [
  {
    id: 1,
    category: "景気・GDP",
    source: "p.9",
    // メインの問題文（サブ問がない場合はここに全文）
    text: "日本の景気を判断する1つの方法として、内閣府が公表している景気動向指数（先行・一致・遅行系列）の分析がある。景気動向指数の先行系列採用指標と遅行系列採用指標を各々2つずつ挙げなさい。",
    // サブ問がある場合（問1・問2など）
    subs: [],
    // 解説ブロック（複数対応）
    answers: [
      {
        label: null,
        text: "【先行系列の例】\n・最終需要財在庫率指数\n・新規求人数（製造業）\n・東証株価指数　など\n\n【遅行系列の例】\n・常用雇用指数（製造業）\n・失業保険受給者数\n・法人税収入　など",
        formula: null
      }
    ]
  },
  {
    id: 2,
    category: "GDP・デフレーター",
    source: "p.14",
    text: "ある年度、ある国において、原油輸入価格が大幅に上昇したが、国内物価（国内需要デフレーター）や輸出物価が上昇しなかったとしよう。このとき、この国のGDPデフレーター対前年比上昇率はどのような値になるか、GDPデフレーターの算出を踏まえて説明しなさい。",
    subs: [],
    answers: [
      {
        label: null,
        text: "GDPは国内総支出（GDE）と等価関係にある。GDEは消費・投資・政府支出・（輸出－輸入）の合計である。\n\nGDPデフレーターは名目GDPを実質GDPで除した値である。国内物価と輸出物価を一定とすると、原油輸入価格の大幅上昇は名目輸入額を増加させる。輸入額はGDEの控除項目であるため、名目GDPは減少する。\n\n一方、実質GDPは基準年次の価格で評価するため変化しない。\n\nしたがって、GDPデフレーター（＝名目GDP÷実質GDP×100）は低下し、対前年比上昇率は<strong>マイナス</strong>となる。",
        formula: "$$GDPデフレーター = \\frac{名目GDP}{実質GDP} \\times 100$$"
      }
    ]
  },
  {
    id: 3,
    category: "GDP・GDI・交易利得",
    source: "p.16",
    text: "",
    subs: [
      { label: "(1)", text: "名目GDPと名目GDIの間にはどのような関係があるか、説明しなさい。" },
      { label: "(2)", text: "実質GDPと実質GDI、交易利得の間にはどのような関係があるか、説明しなさい。" }
    ],
    answers: [
      {
        label: "(1) 名目GDP と 名目GDI",
        text: "名目GDPは一国において一定期間中に生産された粗付加価値の総計である。GDPはすべて生産要素への所得として分配されると考えられるため、<strong>名目GDPと名目GDIは等価関係</strong>にある。",
        formula: null
      },
      {
        label: "(2) 実質GDP・実質GDI・交易利得",
        text: "実質GDPは数量ベースで測るため、輸出入の価格変化（交易条件の変化）を反映しない。一方、交易条件が改善すると（輸出物価↑・輸入物価↓）、同じ生産量でも実質的な購買力は向上する。\n\nそのため、<strong>実質GDI ＝ 実質GDP ＋ 交易利得</strong>という関係が成立する。",
        formula: "$$実質GDI = 実質GDP + 交易利得$$"
      }
    ]
  },
  {
    id: 4,
    category: "45度線分析・乗数",
    source: "p.25–27",
    text: "W国・X国・Z国の3国について、45度線分析（財市場のみ、外国取引なし）で財政政策効果を考える。\n\n財市場均衡式：$Y = C + I + G$\n\nW国・X国の消費関数（ケインズ型）：\n$C_W = C_W^0 + c_W(Y_W - T_W)$\n$C_X = C_X^0 + c_X(Y_X - T_X)$\n\nただし $c_X > c_W$（X国の限界消費性向の方が高い）とする。",
    subs: [
      {
        label: "問1",
        text: "W国およびX国において、定額税が同額減税された場合、それぞれの財政政策効果の相違について説明しなさい。"
      },
      {
        label: "問2",
        text: "Z国では下記2つの給付方法のうち、どちらを採用する方がGDPを増加させる効果が大きいか答え、理由も説明しなさい。\n\nα：すべての家計に一律S円の現金を給付する。\nβ：限界消費性向が高いグループのみに一律2S円の現金を給付する（高グループ・低グループは各50%）。"
      }
    ],
    answers: [
      {
        label: "問1 解答",
        text: "定額税の減税は可処分所得を増加させ、限界消費性向倍だけ消費を増やしGDPを増加させる。さらに乗数効果が生じる。\n\n限界消費性向が大きいほど減税乗数は大きくなるため、$c_X > c_W$ より、<strong>X国の方がW国よりもGDPの増加幅が大きい</strong>。",
        formula: "$$W国の減税乗数：\\frac{c_W}{1-c_W} \\qquad X国の減税乗数：\\frac{c_X}{1-c_X}$$"
      },
      {
        label: "問2 解答",
        text: "定額給付は同額の定額減税と同等の効果をもつ（可処分所得の増加）。\n\n給付総額は同じであるが、βは限界消費性向の高いグループだけに給付するため、減税乗数の値が大きくなる。よって<strong>β（高グループへの2S円給付）の方がGDPを増加させる効果が大きい</strong>。",
        formula: "$$\\Delta Y = \\frac{c}{1-c} \\times 定額給付額$$"
      }
    ]
  },
  {
    id: 5,
    category: "IS-LM分析",
    source: "p.32–33",
    text: "IS-LM分析において、当初の均衡点が $E_0$ であった。その後、家計の基礎消費が増加したため IS曲線が $IS_0$ から $IS_1$ へシフトし、均衡点が $E_1$ に移動した。これは景気過熱による物価上昇を引き起こす可能性がある。\n\n当該国の中央銀行が、GDPをもとの $Y_0$ に戻すためにはどのような政策が必要か、IS-LM分析を用いて説明しなさい。金利とGDPの動きについても言及すること。",
    subs: [],
    answers: [
      {
        label: null,
        text: "中央銀行は<strong>金融引き締め</strong>としてマネーストックを減少させる。これにより LM曲線が $LM_0$ から $LM_1$ へと<strong>左上方にシフト</strong>する。\n\nその結果、均衡点は $E_1$ から $E_0$ に戻り、GDPはもとの $Y_0$ へ減少する。一方、金利は $r_1$ から $r_2$ へと<strong>上昇</strong>する。",
        formula: null
      }
    ]
  }
];
// =====================================================================

let cur = 0;
let tab = 'q';

function pad(n){ return String(n).padStart(2,'0'); }

function render(){
  const q = questions[cur];

  // メタ
  document.getElementById('numDisplay').textContent = pad(q.id);
  document.getElementById('catDisplay').textContent  = q.category;
  document.getElementById('qSource').textContent     = q.source ? `出所：${q.source}` : '';

  // プログレス
  document.getElementById('progBar').style.width = ((cur+1)/questions.length*100)+'%';

  // ページ情報
  document.getElementById('pageLabel').textContent = `${cur+1} / ${questions.length}`;

  // ドット
  const dots = document.getElementById('dotRow');
  dots.innerHTML = '';
  questions.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i===cur?' active':'');
    d.onclick = ()=>{ cur=i; render(); };
    dots.appendChild(d);
  });

  // ボタン
  document.getElementById('prevBtn').disabled = cur===0;
  document.getElementById('nextBtn').disabled = cur===questions.length-1;

  // 問題文
  document.getElementById('qText').innerHTML = q.text
    ? q.text.replace(/\n/g,'<br>')
    : '';

  // サブ問
  const subList = document.getElementById('subQList');
  subList.innerHTML = '';
  if(q.subs && q.subs.length){
    q.subs.forEach(s=>{
      const div = document.createElement('div');
      div.className = 'sub-q';
      div.innerHTML = `<div class="sub-q-label">${s.label}</div><div class="sub-q-text">${s.text.replace(/\n/g,'<br>')}</div>`;
      subList.appendChild(div);
    });
  }

  // 解説
  const expBody = document.getElementById('expBody');
  expBody.innerHTML = '';
  q.answers.forEach(a=>{
    const block = document.createElement('div');
    block.className = 'exp-block';
    let html = '';
    if(a.label) html += `<div class="exp-block-label">${a.label}</div>`;
    html += `<div class="exp-text">${a.text.replace(/\n/g,'<br>')}</div>`;
    if(a.formula) html += `<div class="exp-formula">${a.formula}</div>`;
    block.innerHTML = html;
    expBody.appendChild(block);
  });

  // タブをリセット
  setTab('q', false);

  // MathJax再レンダリング
  if(window.MathJax) MathJax.typesetPromise();
}

function setTab(t, doRender=true){
  tab = t;
  const qPanel = document.getElementById('questionPanel');
  const ePanel = document.getElementById('explanationPanel');
  const tQ = document.getElementById('tabQ');
  const tA = document.getElementById('tabA');

  if(t==='q'){
    qPanel.style.display = '';
    ePanel.style.display = 'none';
    tQ.classList.add('active');
    tA.classList.remove('active');
  } else {
    qPanel.style.display = 'none';
    ePanel.style.display = 'flex';
    tA.classList.add('active');
    tQ.classList.remove('active');
    if(window.MathJax) MathJax.typesetPromise();
  }
}

function go(dir){
  cur = Math.max(0, Math.min(questions.length-1, cur+dir));
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
</body>
</html>
